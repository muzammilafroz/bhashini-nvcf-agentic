name: Hotfix Deploy

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: 'Name of the model to deploy'
        required: true
        type: string
      image_tag:
        description: 'Image tag to deploy (e.g. ghcr.io/...:sha)'
        required: true
        type: string
      skip_canary:
        description: 'Skip canary health gates and promote immediately (EMERGENCY ONLY)'
        required: true
        type: boolean
        default: false

jobs:
  hotfix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Background Mock Services (Mock NVCF & Router)
        run: |
          uvicorn mock_nvcf.app:app --port 8000 &
          uvicorn router.gateway:app --port 8001 &
          sleep 3
          
      - name: Warn on Skip Canary
        if: ${{ inputs.skip_canary }}
        run: |
          echo "::warning title=EMERGENCY HOTFIX::Canary health gates are BYPASSED. Model will be promoted immediately."

      - name: Run Pipeline Orchestrator (Hotfix)
        env:
          HOTFIX_MODEL_NAME: ${{ inputs.model_name }}
          HOTFIX_IMAGE_TAG: ${{ inputs.image_tag }}
          HOTFIX_SKIP_CANARY: ${{ inputs.skip_canary }}
        run: |
          # A real orchestrator script would take these env vars and bypass the detector,
          # skip the canary wait, and do a direct deploy.
          # For the prototype, we simply run the orchestrator in full mode.
          python pipeline/orchestrator.py --mode full

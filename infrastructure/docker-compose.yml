services:
  # The Database (Kong config + TimescaleDB for events)
  kong-db:
    image: timescale/timescaledb:latest-pg13
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kong_pass
    volumes:
      - kong_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432" # Access remotely through SSH/VPN tunnel, not the public internet
    networks:
      - edge_net

  kong-migrations:
    image: kong:3.3.0
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong_pass
    command: kong migrations bootstrap
    restart: on-failure
    depends_on:
      - kong-db
    networks:
      - edge_net

  kong:
    image: kong:3.3.0
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong_pass
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      - "127.0.0.1:8001:8001" # Admin API must not be public
    depends_on:
      - kong-migrations
    networks:
      - edge_net

  # Auto-configure Kong Prometheus plugin
  kong-init:
    image: curlimages/curl:latest
    command: >
      sh -c "
      echo 'Waiting for Kong to start...' &&
      sleep 10 &&
      if curl -sf http://kong:8001/plugins | grep -q '\"name\":\"prometheus\"'; then
        echo 'Kong Prometheus plugin already enabled.';
      else
        curl -sf -X POST http://kong:8001/plugins/ \
          --data 'name=prometheus' \
          --data 'config.status_code_metrics=true' \
          --data 'config.latency_metrics=true';
        echo 'Kong Prometheus plugin enabled.';
      fi
      "
    depends_on:
      - kong
    networks:
      - edge_net

  # Observability (Prometheus)
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prom_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - edge_net

  # Observability (Grafana)
  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - edge_net

volumes:
  kong_data:
  prom_data:
  grafana_data:

networks:
  edge_net:
    driver: bridge
